name: Scrape BASF Hyderabad Jobs

on:
  schedule:
    - cron: "0 */4 * * *"   # Every 4 hours (UTC)
  workflow_dispatch:          # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm install

      - name: 🎭 Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: 🕷️ Run scraper
        run: node scraper.js

      - name: 🔍 Check if data changed
        id: diff
        run: |
          git diff --quiet data/jobs.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 💾 Commit & push updated jobs
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json
          git commit -m "chore: update BASF Hyderabad jobs [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: ✅ No changes detected
        if: steps.diff.outputs.changed == 'false'
        run: echo "Jobs data unchanged since last run."
